server:
  port: 8087

spring:
  application:
    name: producto-service

  mongodb:
    uri: mongodb://localhost:27017/producto-service

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:password@localhost:8761/eureka
#      defaultZone: http://localhost:8761/eureka

logging:
  pattern:
    level: "%5p [traceId=%X{trace_id} spanId=%X{span_id}]"

# CONFIGURACION PROMETHEUS
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus