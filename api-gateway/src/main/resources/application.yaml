# ==============================================
# CONFIGURACIÓN DEL SERVIDOR
# ==============================================
server:
  port: 8083

# ==============================================
# CONFIGURACIÓN DE LA APLICACIÓN
# ==============================================
spring:
  application:
    name: api-gateway

  # ==============================================
  # CONFIGURACIÓN DE RUTAS DEL GATEWAY
  # ==============================================
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # -------------------------------------------------
            # RUTA 1: Producto Service
            # -------------------------------------------------
            - id: producto-service  # Identificador único de la ruta
              uri: lb://producto-service  # 'lb://' indica balanceo de carga con Eureka
              predicates:
                - Path=/api/producto/**  # Cuando alguien llame a /api/producto, redirige a producto-service

            # -------------------------------------------------
            # RUTA 2: Order Service
            # -------------------------------------------------
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/order/**  # Las peticiones a /api/order van a order-service

            # -------------------------------------------------
            # RUTA 3: Dashboard de Eureka (web)
            # -------------------------------------------------
            - id: discovery-server
              uri: http://localhost:8761  # URL directa del servidor Eureka
              predicates:
                - Path=/eureka/web  # Cuando alguien vaya a /eureka/web
              filters:
                - SetPath=/  # Reescribe la ruta a '/' antes de enviarla a Eureka

            # -------------------------------------------------
            # RUTA 4: Recursos estáticos de Eureka (CSS, JS, etc.)
            # -------------------------------------------------
            - id: discovery-server-static
              uri: http://localhost:8761
              predicates:
                - Path=/eureka/**  # Captura todo lo que empiece con /eureka/
              # Nota: No tiene filtros para no interferir con los recursos estáticos

# ==============================================
# CONFIGURACIÓN DE LOGGING (NO USAR EN PRODUCCION)
# ==============================================
logging:
  level:
    root: INFO  # Nivel por defecto para toda la aplicación
    org.springframework.cloud.gateway: INFO  # Logs DETALLADOS del Gateway (NO USAR EN PRODUCCION)

# ==============================================
# CONFIGURACIÓN DE EUREKA (CLIENTE)
# ==============================================
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true # necesario para resolver lb://
    register-with-eureka: true # para que aparezca en el dashboard
  instance:
    prefer-ip-address: true  # evita problemas con hostnames en Windows