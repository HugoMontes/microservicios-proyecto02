server:
  port: 8082

spring:
  application:
    name: inventario-service

  datasource:
    url: jdbc:mysql://localhost:3306/inventario_service
    username: root
    password: 123456
    driver: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:password@localhost:8761/eureka
#      defaultZone: http://localhost:8761/eureka

logging:
  pattern:
    level: "%5p [traceId=%X{trace_id} spanId=%X{span_id}]"

# CONFIGURACION PROMETHEUS
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus