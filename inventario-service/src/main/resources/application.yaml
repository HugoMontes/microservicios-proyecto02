server:
  port: 8082

spring:
  application:
    name: inventario-service

  datasource:
    url: jdbc:mysql://localhost:3306/inventario_service
    username: root
    password: 123456
    driver: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect